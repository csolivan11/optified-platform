apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: optified-secrets-provider
  namespace: optified
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/optified-prod/secrets/supabase-anon-key/versions/latest"
        fileName: supabase-anon-key
      - resourceName: "projects/optified-prod/secrets/supabase-jwt-secret/versions/latest"
        fileName: supabase-jwt-secret
      - resourceName: "projects/optified-prod/secrets/resend-api-key/versions/latest"
        fileName: resend-api-key
  secretObjects:
  - secretName: optified-secrets
    type: Opaque
    data:
    - objectName: supabase-anon-key
      key: NEXT_PUBLIC_SUPABASE_ANON_KEY
    - objectName: supabase-jwt-secret
      key: SUPABASE_JWT_SECRET
    - objectName: resend-api-key
      key: RESEND_API_KEY
