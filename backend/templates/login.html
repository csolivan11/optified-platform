{{define "content"}}
<div class="flex min-h-[70vh] flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="mt-6 text-center text-3xl font-extrabold tracking-tight text-slate-100">
            Sign in to your dashboard
        </h2>
        <p class="mt-2 text-center text-sm text-slate-400">
            Optified Premium Longevity Portal
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-navy-950 border border-navy-850 px-4 py-8 shadow-xl rounded-xl sm:px-10">
            <!-- Form triggers POST request to /api/auth/login via standard form or HTMX -->
            <form hx-post="/api/auth/login" hx-target="body" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-350">
                        Email address
                    </label>
                    <div class="mt-1">
                        <input id="email" name="email" type="email" autocomplete="email" required
                            class="appearance-none block w-full px-3 py-2 border border-navy-800 rounded-md shadow-sm placeholder-slate-500 bg-navy-900 text-slate-100 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-350">
                        Password
                    </label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" autocomplete="current-password" required
                            class="appearance-none block w-full px-3 py-2 border border-navy-800 rounded-md shadow-sm placeholder-slate-500 bg-navy-900 text-slate-100 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
                    </div>
                </div>

                <!-- MFA TOTP Verification Code -->
                <div>
                    <label for="totp" class="block text-sm font-medium text-slate-300">
                        MFA Verification Code (TOTP)
                    </label>
                    <div class="mt-1">
                        <input id="totp" name="totp" type="text" placeholder="6-digit token (e.g., 123456)"
                            class="appearance-none block w-full px-3 py-2 border border-navy-800 rounded-md shadow-sm placeholder-slate-550 bg-navy-900 text-slate-100 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox"
                            class="h-4 w-4 text-emerald-600 focus:ring-emerald-500 border-navy-800 rounded bg-navy-900">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-400">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-emerald-400 hover:text-emerald-300 transition">
                            Forgot your password?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-emerald-600 hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                        Sign in
                    </button>
                </div>
            </form>

            <div id="login-error" class="mt-4 text-center text-xs text-red-400"></div>
            <script>
                const urlParams = new URLSearchParams(window.location.search);
                const error = urlParams.get('error');
                if (error === 'timeout') {
                    document.getElementById('login-error').innerText = 'Session expired due to inactivity (15 mins). Please sign in again.';
                } else if (error === 'expired') {
                    document.getElementById('login-error').innerText = 'Authentication token expired.';
                }
            </script>
        </div>
    </div>
</div>
{{end}}
